# mistaike-local-stack — Full local development environment
# All services on the 3000s port range
# Usage: docker compose up -d
#
# Prerequisites:
#   git submodule update --init --recursive
#   OLLAMA_API_KEY set in environment (cloud Ollama API)

x-ollama-env: &ollama-env
  OLLAMA_ENDPOINT: http://host.docker.internal:11434

services:
  # --- Database (Port 3003) ---
  mistake-postgres-dev:
    image: pgvector/pgvector:pg16
    container_name: mistake-postgres-dev
    ports:
      - "127.0.0.1:3003:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pattern_db
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
      - ./init/01_run_migrations.sh:/docker-entrypoint-initdb.d/01_run_migrations.sh
      - ./init/00_create_roles.sql:/migrations/00_init/00_create_roles.sql
      - ./repos/middleware/db/migrations:/migrations/01_middleware
      - ../mistaike-db-backend/db/migrations:/migrations/02_backend
      - ./seed:/migrations/50_seed
    networks:
      - mistaike-unified-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis (Port 6379) ---
  mistake-redis-dev:
    image: redis:7-alpine
    container_name: mistake-redis-dev
    networks:
      - mistaike-unified-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- PGAdmin (Port 3004) ---
  mistake-pgadmin-dev:
    image: dpage/pgadmin4:latest
    container_name: mistake-pgadmin-dev
    ports:
      - "127.0.0.1:3004:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@mistaike.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_DISABLE_POSTFIX: "true"
    volumes:
      - pgadmin-data-dev:/var/lib/pgadmin
    depends_on:
      mistake-postgres-dev:
        condition: service_healthy
    networks:
      - mistaike-unified-net
    restart: unless-stopped

  # --- Middleware: Public API (Port 3002) ---
  mistake-api-public:
    build:
      context: ../mistaike-db-middleware
      dockerfile: Dockerfile.api
    container_name: mistake-api-public
    ports:
      - "127.0.0.1:3002:8080"
    command: ["/bin/bash", "-c", "uvicorn api.api.app:app --host 0.0.0.0 --port 8080 --reload"]
    volumes:
      - ./repos/middleware/src:/app/src
      - ./repos/middleware/tests:/app/tests
      - ./repos/middleware/pyproject.toml:/app/pyproject.toml
      - ./repos/middleware/poetry.lock:/app/poetry.lock
      - ./repos/middleware/db/migrations:/app/db_migrations
    environment:
      <<: *ollama-env
      API_SCOPE: public
      DATABASE_URL: postgresql://postgres:postgres@mistake-postgres-dev:5432/pattern_db?sslmode=disable
      REDIS_URL: redis://mistake-redis-dev:6379/0
      VAULT_PLATFORM_KEY: ${VAULT_PLATFORM_KEY:-FBlDrawLFRMBwd98e7IPYCT8SlI6VfNvyozEBdbG2iA=}
      PORT: 8080
      PYTHONPATH: /app/src
      LOG_LEVEL: debug
      ENV: DEV
    depends_on:
      mistake-postgres-dev:
        condition: service_healthy
      mistake-redis-dev:
        condition: service_healthy
    networks:
      - mistaike-unified-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Middleware: Internal API (Port 3005) ---
  mistake-api-internal:
    build:
      context: ../mistaike-db-middleware
      dockerfile: Dockerfile.api
    container_name: mistake-api-internal
    ports:
      - "127.0.0.1:3006:8080"
    command: ["/bin/bash", "-c", "uvicorn api.api.app:app --host 0.0.0.0 --port 8080 --reload"]
    volumes:
      - ./repos/middleware/src:/app/src
      - ./repos/middleware/tests:/app/tests
      - ./repos/middleware/pyproject.toml:/app/pyproject.toml
      - ./repos/middleware/poetry.lock:/app/poetry.lock
      - ./repos/middleware/db/migrations:/app/db_migrations
    environment:
      <<: *ollama-env
      API_SCOPE: internal
      DATABASE_URL: postgresql://postgres:postgres@mistake-postgres-dev:5432/pattern_db?sslmode=disable
      REDIS_URL: redis://mistake-redis-dev:6379/0
      PORT: 8080
      PYTHONPATH: /app/src
      LOG_LEVEL: debug
      ENV: DEV
      MISTAIKE_AUTO_SEED: "true"
      MIGRATIONS_DIR: /app/db_migrations
    depends_on:
      mistake-postgres-dev:
        condition: service_healthy
      mistake-redis-dev:
        condition: service_healthy
    networks:
      - mistaike-unified-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- UI (Port 3001) ---
  mistake-ui-dev:
    build:
      context: ../mistaike-db-ui
      dockerfile: Dockerfile.dev
    container_name: mistake-ui-dev
    command: ["npm", "run", "dev"]
    ports:
      - "0.0.0.0:3001:3000"
    volumes:
      - ./repos/ui/src:/app/src
      - ./repos/ui/public:/app/public
      - ./repos/ui/package.json:/app/package.json
      - ./repos/ui/package-lock.json:/app/package-lock.json
      - ./repos/ui/tsconfig.json:/app/tsconfig.json
      - ./repos/ui/next.config.ts:/app/next.config.ts
      - ./repos/ui/tailwind.config.ts:/app/tailwind.config.ts
      - ./repos/ui/postcss.config.mjs:/app/postcss.config.mjs
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: 1
      API_INTERNAL_URL: http://mistake-api-internal:8080
      API_PUBLIC_URL: http://mistake-api-public:8080
      NEXT_PUBLIC_API_URL: http://localhost:3002
    depends_on:
      mistake-api-internal:
        condition: service_healthy
      mistake-api-public:
        condition: service_healthy
    networks:
      - mistaike-unified-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # --- MCP Server (Port 3007) ---
  mistake-mcp-dev:
    build:
      context: ../mistaike-mcp
      dockerfile: Dockerfile.mistake-mcp
    container_name: mistake-mcp-dev
    ports:
      - "127.0.0.1:3007:8000"
    environment:
      <<: *ollama-env
      DATABASE_URL: postgresql://postgres:postgres@mistake-postgres-dev:5432/pattern_db
      VAULT_PLATFORM_KEY: ${VAULT_PLATFORM_KEY:-FBlDrawLFRMBwd98e7IPYCT8SlI6VfNvyozEBdbG2iA=}
      LOG_LEVEL: debug
      PYTHONPATH: /app/src
    depends_on:
      mistake-postgres-dev:
        condition: service_healthy
    networks:
      - mistaike-unified-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres-data-dev:
    name: local-stack-postgres-data
  pgadmin-data-dev:
    name: local-stack-pgadmin-data

networks:
  mistaike-unified-net:
    name: mistaike-unified-net
    driver: bridge
